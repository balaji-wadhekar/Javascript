<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - Grievance Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h2>👤 Student Dashboard</h2>
    <button class="login" onclick="logout()">Logout</button>
  </nav>

  <div class="container">
    <!-- Statistics Section -->
    <div class="stats-container">
      <div class="stat-card blue">
        <h4>Total Complaints</h4>
        <div class="number" id="totalComplaints">0</div>
      </div>
      <div class="stat-card orange">
        <h4>Pending</h4>
        <div class="number" id="pendingComplaints">0</div>
      </div>
      <div class="stat-card green">
        <h4>Resolved</h4>
        <div class="number" id="resolvedComplaints">0</div>
      </div>
    </div>

    <!-- File New Complaint Section -->
    <div class="form-section">
      <h3>📝 File a New Complaint</h3>
      
      <div id="complaintAlert"></div>
      
      <form id="complaintForm" onsubmit="submitComplaint(event)">
        <input 
          type="text" 
          id="title" 
          placeholder="Complaint Title (e.g., Hostel Water Supply Issue)" 
          required
          maxlength="100"
        >
        
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="Academic">📚 Academic</option>
          <option value="Hostel">🏠 Hostel</option>
          <option value="Exam">📝 Exam</option>
          <option value="Infrastructure">🏗️ Infrastructure</option>
          <option value="Library">📖 Library</option>
          <option value="Canteen">🍽️ Canteen</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Other">📋 Other</option>
        </select>
        
        <textarea 
          id="description" 
          placeholder="Describe your grievance in detail..." 
          required
          maxlength="500"
        ></textarea>
        
        <button class="submit_comaplaint" type="submit">Submit Complaint</button>
      </form>
    </div>

    <!-- My Complaints Section -->
    <h3>📋 My Complaints</h3>
    
    <!-- Search and Filter -->
    <div class="filter-section">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="🔍 Search complaints..." 
        onkeyup="filterComplaints()"
      >
      <select id="statusFilter" onchange="filterComplaints()">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
      </select>
      <select id="categoryFilter" onchange="filterComplaints()">
        <option value="">All Categories</option>
        <option value="Academic">Academic</option>
        <option value="Hostel">Hostel</option>
        <option value="Exam">Exam</option>
        <option value="Infrastructure">Infrastructure</option>
        <option value="Library">Library</option>
        <option value="Canteen">Canteen</option>
        <option value="Transport">Transport</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="table-container">
      <table id="complaintTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Description</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <p style="font-size: 3rem;">📭</p>
      <p>No complaints filed yet. File your first complaint above!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
