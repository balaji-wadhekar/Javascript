<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product Filter App</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --muted:#6b7280; --accent:#2563eb;
      --radius:12px; --shadow: 0 6px 18px rgba(16,24,40,0.06);
      --gap:16px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color-scheme: light;
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:#0f172a; line-height:1.45;
      padding:28px; -webkit-font-smoothing:antialiased;
    }
    .container{
      max-width:1200px; margin:0 auto; display:grid;
      grid-template-columns: 280px 1fr; gap:24px;
    }

    /* Sidebar */
    .filters{
      background:var(--card); padding:18px; border-radius:var(--radius); box-shadow:var(--shadow);
      height:fit-content;
    }
    .filters h3{margin:0 0 12px 0; font-size:16px}
    .group{margin-bottom:18px;}
    label.small{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:14px; cursor:pointer}
    input[type="checkbox"]{width:16px;height:16px}

    /* Price range */
    .range-row{display:flex; gap:8px; align-items:center}
    .range-row input[type="number"]{width:100%; padding:6px 8px; border-radius:8px; border:1px solid #e6e9ef; font-size:14px}
    .range-slider{display:flex; gap:8px; align-items:center}

    /* Main area */
    header.main-head{display:flex; gap:12px; align-items:center; margin-bottom:16px}
    .search{
      flex:1; display:flex; gap:8px; align-items:center;
      background:var(--card); padding:12px; border-radius:12px; box-shadow:var(--shadow);
    }
    .search input{
      border:0; outline:none; font-size:15px; flex:1;
    }
    .controls{display:flex; gap:8px; align-items:center}
    select, button{
      padding:8px 10px; border-radius:10px; border:1px solid #e6e9ef; background:#fff; font-size:14px;
    }
    button.primary{
      background:var(--accent); color:#fff; border:0; cursor:pointer;
    }

    /* Product grid */
    .grid{display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:18px}
    .card{
      background:var(--card); border-radius:14px; padding:12px; box-shadow:var(--shadow);
      display:flex; flex-direction:column; gap:8px;
    }
    .thumb{height:140px; border-radius:10px; background-size:cover; background-position:center}
    .title{font-weight:600; font-size:15px}
    .muted{color:var(--muted); font-size:13px}
    .price{font-weight:700; font-size:16px}
    .tags{display:flex; gap:8px; flex-wrap:wrap}
    .chip{font-size:12px; padding:4px 8px; border-radius:999px; background:#eef2ff; color:#3730a3}

    /* Empty */
    .empty{padding:36px; text-align:center; color:var(--muted); background:#fff; border-radius:12px; box-shadow:var(--shadow)}

    /* Responsive */
    @media (max-width:880px){
      .container{grid-template-columns: 1fr; padding:16px}
      .filters{order:2}
      header.main-head{flex-direction:column; align-items:stretch}
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <!-- Sidebar filters -->
  <aside class="filters" aria-labelledby="filters-heading">
    <h3 id="filters-heading">Filters</h3>

    <div class="group" id="categories-group">
      <div class="muted" style="margin-bottom:8px">Category</div>
      <div>
        <!-- categories will be injected -->
      </div>
    </div>

    <div class="group">
      <div class="muted" style="margin-bottom:8px">Price</div>
      <div class="range-slider">
        <input id="minPrice" type="number" step="1" min="0" value="0" aria-label="Minimum price">
        <input id="maxPrice" type="number" step="1" min="0" value="1000" aria-label="Maximum price">
      </div>
      <div style="margin-top:8px" class="muted">Range: <span id="priceRangeText">0 - 1000</span></div>
    </div>

    <div class="group">
      <div class="muted" style="margin-bottom:8px">Rating</div>
      <div>
        <label class="small"><input type="radio" name="rating" value="0" checked> Any</label>
        <label class="small"><input type="radio" name="rating" value="4"> 4+ Stars</label>
        <label class="small"><input type="radio" name="rating" value="3"> 3+ Stars</label>
      </div>
    </div>

    <div class="group">
      <div class="muted" style="margin-bottom:8px">Tags</div>
      <div id="tags-list" style="display:flex; gap:8px; flex-wrap:wrap">
        <!-- tag chips injected -->
      </div>
    </div>

    <div style="display:flex; gap:8px; margin-top:8px">
      <button id="resetBtn">Reset</button>
      <button id="applyBtn" class="primary">Apply</button>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="main-head">
      <div class="search" role="search" aria-label="Product search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden><path d="M21 21l-4.35-4.35" stroke="#9ca3af" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <input id="searchInput" type="search" placeholder="Search products, e.g. 'mug' or 'wireless'">
        <div class="muted" id="resultCount">0 products</div>
      </div>

      <div class="controls" aria-hidden>
        <select id="sortSelect" title="Sort products">
          <option value="default">Sort: Featured</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="name-asc">Name: A → Z</option>
          <option value="name-desc">Name: Z → A</option>
        </select>
      </div>
    </div>

    <section id="productsSection">
      <div id="tagsActive" style="margin-bottom:10px"></div>
      <div class="grid" id="productsGrid" aria-live="polite" aria-label="Filtered products"></div>
    </section>
  </main>
</div>

<script>
/*
Product Filter App - plain JS
Features:
 - Sample products array (replace with real data)
 - Build category list / tag list from data
 - Filter by categories, price range, rating, tags, search text
 - Sort results
 - Debounced search
*/

const state = {
  products: [],       // will hold product objects
  filters: {
    categories: new Set(),
    minPrice: 0,
    maxPrice: 1000,
    rating: 0,
    tags: new Set(),
    query: '',
    sort: 'default'
  }
};

// Sample product data (replace or load via fetch)
const sampleProducts = [
  { id:1, title:"Wireless Headphones", price:249, category:"Electronics", tags:["wireless","audio"], rating:4.5, image:"https://picsum.photos/seed/h1/600/400" },
  { id:2, title:"Ceramic Coffee Mug", price:12, category:"Home", tags:["kitchen","ceramic"], rating:4.1, image:"https://picsum.photos/seed/mug/600/400" },
  { id:3, title:"Running Shoes", price:89, category:"Fashion", tags:["sports","shoes"], rating:4.3, image:"https://picsum.photos/seed/shoe/600/400" },
  { id:4, title:"Bluetooth Speaker", price:59, category:"Electronics", tags:["audio","portable"], rating:3.9, image:"https://picsum.photos/seed/spk/600/400" },
  { id:5, title:"Organic Face Serum", price:29, category:"Beauty", tags:["skincare","organic"], rating:4.7, image:"https://picsum.photos/seed/serum/600/400" },
  { id:6, title:"Desk Lamp", price:39, category:"Home", tags:["lighting","office"], rating:4.0, image:"https://picsum.photos/seed/lamp/600/400" },
  { id:7, title:"Yoga Mat", price:25, category:"Fitness", tags:["sports","yoga"], rating:4.2, image:"https://picsum.photos/seed/yoga/600/400" },
  { id:8, title:"Stainless Steel Water Bottle", price:18, category:"Outdoors", tags:["camping","bottle"], rating:4.4, image:"https://picsum.photos/seed/bottle/600/400" },
  { id:9, title:"Gaming Mouse", price:49, category:"Electronics", tags:["gaming","peripherals"], rating:4.6, image:"https://picsum.photos/seed/mouse/600/400" },
  { id:10, title:"Scented Candle", price:15, category:"Home", tags:["decor","fragrance"], rating:3.8, image:"https://picsum.photos/seed/candle/600/400" }
];

// Utilities
const el = (sel) => document.querySelector(sel);
const els = (sel) => Array.from(document.querySelectorAll(sel));

// Initialize
function init(){
  // load products (in real app, fetch from API)
  state.products = sampleProducts.slice();

  buildFiltersFromProducts();
  attachEventHandlers();
  updatePriceInputs();
  applyFiltersAndRender();
}

// Build category & tags UI based on data
function buildFiltersFromProducts(){
  const cats = new Set();
  const tags = new Set();
  let maxPrice = 0;

  state.products.forEach(p=>{
    cats.add(p.category);
    (p.tags || []).forEach(t => tags.add(t));
    if(p.price > maxPrice) maxPrice = p.price;
  });

  // categories
  const catContainer = el('#categories-group > div');
  catContainer.innerHTML = '';
  Array.from(cats).sort().forEach(cat=>{
    const id = `cat-${cat.replace(/\s+/g,'-').toLowerCase()}`;
    const wrapper = document.createElement('div');
    wrapper.innerHTML = `
      <label class="small" for="${id}">
        <input type="checkbox" id="${id}" name="category" value="${cat}">
        <span>${cat}</span>
      </label>`;
    catContainer.appendChild(wrapper);
  });

  // tags
  const tagsList = el('#tags-list');
  tagsList.innerHTML = '';
  Array.from(tags).sort().forEach(t=>{
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip';
    chip.textContent = t;
    chip.setAttribute('data-tag', t);
    chip.setAttribute('aria-pressed','false');
    chip.style.border='none';
    chip.style.cursor='pointer';
    tagsList.appendChild(chip);
  });

  // set price max default
  state.filters.maxPrice = Math.ceil(maxPrice || 1000);
  state.filters.minPrice = 0;
  el('#minPrice').value = state.filters.minPrice;
  el('#maxPrice').value = state.filters.maxPrice;
  el('#priceRangeText').textContent = `${state.filters.minPrice} - ${state.filters.maxPrice}`;
}

// Attach event listeners
function attachEventHandlers(){
  // Category checkboxes (event delegation)
  el('#categories-group').addEventListener('change', e=>{
    if(e.target && e.target.matches('input[type="checkbox"][name="category"]')){
      const val = e.target.value;
      if(e.target.checked) state.filters.categories.add(val);
      else state.filters.categories.delete(val);
      applyFiltersAndRender();
    }
  });

  // Tag chips
  el('#tags-list').addEventListener('click', e=>{
    const btn = e.target.closest('button[data-tag]');
    if(!btn) return;
    const tag = btn.getAttribute('data-tag');
    if(state.filters.tags.has(tag)){
      state.filters.tags.delete(tag);
      btn.setAttribute('aria-pressed','false');
      btn.style.opacity = '1';
    } else {
      state.filters.tags.add(tag);
      btn.setAttribute('aria-pressed','true');
      btn.style.opacity = '0.7';
    }
    applyFiltersAndRender();
  });

  // price inputs
  el('#minPrice').addEventListener('input', e=>{
    const v = Number(e.target.value) || 0;
    state.filters.minPrice = Math.max(0, v);
    updatePriceText();
  });
  el('#maxPrice').addEventListener('input', e=>{
    const v = Number(e.target.value) || 0;
    state.filters.maxPrice = Math.max(0, v);
    updatePriceText();
  });

  // rating radios
  els('input[name="rating"]').forEach(r=>{
    r.addEventListener('change', e=>{
      state.filters.rating = Number(e.target.value || 0);
      applyFiltersAndRender();
    });
  });

  // search with debounce
  const searchInput = el('#searchInput');
  let debounceTimer = null;
  searchInput.addEventListener('input', e=>{
    const v = e.target.value.trim();
    state.filters.query = v;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(()=> applyFiltersAndRender(), 300);
  });

  // sort select
  el('#sortSelect').addEventListener('change', e=>{
    state.filters.sort = e.target.value;
    applyFiltersAndRender();
  });

  // apply & reset buttons
  el('#applyBtn').addEventListener('click', applyFiltersAndRender);
  el('#resetBtn').addEventListener('click', resetFilters);
}

// Update displayed price text
function updatePriceText(){
  const min = state.filters.minPrice;
  const max = state.filters.maxPrice;
  if(max < min){
    // keep max >= min
    state.filters.maxPrice = min;
    el('#maxPrice').value = state.filters.maxPrice;
  }
  el('#priceRangeText').textContent = `${state.filters.minPrice} - ${state.filters.maxPrice}`;
  // live apply small changes (optional)
  applyFiltersAndRender();
}

// Ensure price inputs are sensible on init
function updatePriceInputs(){
  const minInput = el('#minPrice'), maxInput = el('#maxPrice');
  minInput.value = state.filters.minPrice;
  maxInput.value = state.filters.maxPrice;
  el('#priceRangeText').textContent = `${state.filters.minPrice} - ${state.filters.maxPrice}`;
}

// Reset filters
function resetFilters(){
  state.filters = {
    categories: new Set(),
    minPrice: 0,
    maxPrice: Math.ceil(Math.max(...state.products.map(p=>p.price), 100)),
    rating: 0,
    tags: new Set(),
    query: '',
    sort: 'default'
  };
  // reset UI
  els('input[type=checkbox][name=category]').forEach(c=>c.checked=false);
  els('button.chip').forEach(b=>{ b.setAttribute('aria-pressed','false'); b.style.opacity='1'; });
  els('input[name="rating"]').forEach(r=>{ if(r.value==='0') r.checked=true;});
  el('#minPrice').value = state.filters.minPrice;
  el('#maxPrice').value = state.filters.maxPrice;
  el('#priceRangeText').textContent = `${state.filters.minPrice} - ${state.filters.maxPrice}`;
  el('#searchInput').value = '';
  el('#sortSelect').value = 'default';
  applyFiltersAndRender();
}

// Core filtering logic
function applyFiltersAndRender(){
  let results = state.products.slice();

  // categories
  if(state.filters.categories.size > 0){
    results = results.filter(p => state.filters.categories.has(p.category));
  }

  // price
  results = results.filter(p => p.price >= state.filters.minPrice && p.price <= state.filters.maxPrice);

  // rating
  if(state.filters.rating > 0){
    results = results.filter(p => Math.floor(p.rating) >= state.filters.rating);
  }

  // tags (product must include all selected tags)
  if(state.filters.tags.size > 0){
    results = results.filter(p => {
      const pTags = new Set(p.tags || []);
      for(const t of state.filters.tags){
        if(!pTags.has(t)) return false;
      }
      return true;
    });
  }

  // text search (title or category or tags)
  if(state.filters.query){
    const q = state.filters.query.toLowerCase();
    results = results.filter(p => {
      if(p.title.toLowerCase().includes(q)) return true;
      if(p.category.toLowerCase().includes(q)) return true;
      if((p.tags || []).some(t => t.toLowerCase().includes(q))) return true;
      return false;
    });
  }

  // sort
  switch(state.filters.sort){
    case 'price-asc': results.sort((a,b)=>a.price-b.price); break;
    case 'price-desc': results.sort((a,b)=>b.price-a.price); break;
    case 'name-asc': results.sort((a,b)=>a.title.localeCompare(b.title)); break;
    case 'name-desc': results.sort((a,b)=>b.title.localeCompare(a.title)); break;
    default: /* keep original order */ break;
  }

  renderProducts(results);
}

// Render products in grid
function renderProducts(products){
  const grid = el('#productsGrid');
  const countText = el('#resultCount');
  grid.innerHTML = '';
  if(products.length === 0){
    grid.innerHTML = `<div class="empty" role="status">No products match those filters.</div>`;
    countText.textContent = '0 products';
    el('#tagsActive').innerHTML = '';
    return;
  }

  countText.textContent = `${products.length} product${products.length>1?'s':''}`;

  // show active tags (categories / tags / search)
  const active = [];
  if(state.filters.categories.size) active.push(...Array.from(state.filters.categories).map(c=>`Category: ${c}`));
  if(state.filters.tags.size) active.push(...Array.from(state.filters.tags).map(t=>`Tag: ${t}`));
  if(state.filters.query) active.push(`Search: "${state.filters.query}"`);
  el('#tagsActive').innerHTML = active.map(a=>`<span class="chip" style="background:#fff;border:1px solid #e6e9ef">${a}</span>`).join(' ');

  products.forEach(p=>{
    const div = document.createElement('article');
    div.className = 'card';
    div.innerHTML = `
      <div class="thumb" style="background-image:url('${p.image}')"></div>
      <div>
        <div class="title">${escapeHtml(p.title)}</div>
        <div class="muted">${escapeHtml(p.category)} • ${p.rating} ★</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:auto">
        <div>
          <div class="price">₹${formatPrice(p.price)}</div>
        </div>
        <div class="tags">
          ${(p.tags||[]).map(t=>`<span class="chip">${escapeHtml(t)}</span>`).join('')}
        </div>
      </div>
    `;
    grid.appendChild(div);
  });
}

// small helpers
function formatPrice(n){ return Number(n).toLocaleString('en-IN'); }
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }

// init app
init();
</script>
</body>
</html>
