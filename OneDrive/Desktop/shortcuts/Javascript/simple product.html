<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Product Filter</title>

  <style>
    body { 
        font-family: system-ui, Arial; padding:18px; background:#f4f6fb; color:#0b1220 }
    .app { max-width:900px; margin:0 auto }
    .controls { display:flex; gap:8px; margin-bottom:12px; align-items:center; }
    input, select, button { padding:8px; border-radius:6px; border:1px solid #dfe6f1 }

    .grid { 
      display:grid; 
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); 
      gap:12px;
    }

    .card { 
      background:#fff; 
      padding:12px; 
      border-radius:8px; 
      box-shadow:0 6px 12px rgba(12,20,40,0.04);
    }

    /* IMAGE STYLING */
    .card img {
      width:100%;
      height:150px;
      object-fit:cover;
      border-radius:8px;
      display:block;
      margin-bottom:8px;
    }

    .no-img {
      width:100%;
      height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: #e5e7eb;
      border-radius:8px;
      color:#6b7280;
      margin-bottom:8px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h2>Simple Product Filter with Images</h2>

    <div class="controls">
      <input id="q" placeholder="search (title or tag)" />
      <select id="category">
        <option value="">All categories</option>
      </select>
      <select id="sort">
        <option value="none">Sort</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
      </select>
      <button id="reset">Reset</button>
    </div>

    <div id="summary"></div>
    <div id="tagContainer" style="margin-bottom:12px;"></div>
    <div class="grid" id="grid"></div>
  </div>

<script>
/* ============================
   PRODUCTS WITH IMAGES
============================ */
const PRODUCTS = [
  { id:1, title:'Wireless Headphones', price:249, category:'Electronics', tags:['audio','wireless'], image:"https://picsum.photos/seed/h1/600/400"},
  { id:2, title:'Ceramic Mug', price:12, category:'Home', tags:['kitchen','ceramic'], image:"https://picsum.photos/seed/mug/600/400"},
  { id:3, title:'Running Shoes', price:89, category:'Fashion', tags:['sports','shoes'], image:"https://picsum.photos/seed/yoga/600/400"},
  { id:4, title:'Desk Lamp', price:39, category:'Home', tags:['lighting','office'], image:"https://picsum.photos/seed/candle/600/400"},
  { id:5, title:'Face Serum', price:29, category:'Beauty', tags:['skincare'], image:"https://picsum.photos/seed/serum/600/400"}
];

/* ============================
   STATE
============================ */
let state = {
  query: '',
  category: '',
  sort: 'none',
 
};

const el = id => document.getElementById(id);

/* ============================
   RENDER GRID (images included)
============================ */
const renderGrid = items => {
  const grid = el('grid');
  grid.innerHTML = '';

  if(items.length === 0){
    grid.innerHTML = `<div class="card">No products found</div>`;
    return;
  }

  items.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${p.image}" alt="${p.title}" loading="lazy" 
           onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<div class=\'no-img\'>Image not available</div>')">

      <div style="font-weight:600">${p.title}</div>
      <div style="color:#6b7280">${p.category} • ₹${p.price}</div>

      <div style="margin-top:8px">
        ${p.tags.map(t => `<span class="chip" data-tag="${t}">${t}</span>`).join(' ')}
      </div>
    `;

    grid.appendChild(div);
  });
};

/* ============================
   APPLY FILTERS
============================ */
const applyFilters = () => {
  let results = [...PRODUCTS];
  const { query, category, sort } = state;

  if(category) results = results.filter(p => p.category === category);
  if(query) results = results.filter(p => p.title.toLowerCase().includes(query.toLowerCase()));

  if(sort === "price-asc") results.sort((a,b)=>a.price - b.price);
  if(sort === "price-desc") results.sort((a,b)=>b.price - a.price);

  el('summary').textContent = `${results.length} product(s)`;

  renderGrid(results);
};

/* ============================
   SETUP FILTERS
============================ */
const setupFilters = () => {
  // categories
  const cats = [...new Set(PRODUCTS.map(p=>p.category))];
  const catSelect = el('category');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    catSelect.appendChild(opt);
  });
};

/* ============================
   EVENTS
============================ */
const init = () => {
  setupFilters();
  applyFilters();

  el('q').addEventListener('input', e => {
    state.query = e.target.value;
    applyFilters();
  });

  el('category').addEventListener('change', e => {
    state.category = e.target.value;
    applyFilters();
  });

  el('sort').addEventListener('change', e => {
    state.sort = e.target.value;
    applyFilters();
  });

  el('reset').addEventListener('click', () => {
    state = { query:'', category:'', sort:'none', selectedTags:new Set() };
    el('q').value = "";
    el('category').value = "";
    el('sort').value = "none";
    applyFilters();
  });
};

init();
</script>
</body>
</html>
