<!DOCTYPE html>
<html>
<head>
<title>JavaScript Chatbot</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#chat-container{
width:350px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

#header{
background:#4CAF50;
color:white;
padding:10px;
text-align:center;
border-radius:10px 10px 0 0;
}

#chatbox{
height:350px;
overflow-y:auto;
padding:10px;
}

.message{
margin:8px 0;
}

.user{
text-align:right;
color:#333;
}

.bot{
text-align:left;
color:#4CAF50;
}

#input-area{
display:flex;
border-top:1px solid #ccc;
}

#userInput{
flex:1;
border:none;
padding:10px;
outline:none;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body>

<div id="chat-container">

<div id="header">
Smart JS Chatbot
</div>

<div id="chatbox"></div>

<div id="input-area">
<input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKey(event)">
<button onclick="sendMessage()">Send</button>
</div>

</div>


</body>
</html>
