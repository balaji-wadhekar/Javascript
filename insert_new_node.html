<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Node Insertion</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 5px 20px rgba(224, 144, 144, 0.15);
}

h2{
    text-align:center;
}

input{
    width:70%;
    padding:8px;
}

button{
    padding:8px 12px;
    background:#0077ff;
    color:white;
    border:none;
    cursor:pointer;
}

ul{
    margin-top:20px;
    padding:0;
}

li{
    list-style:none;
    background:#e9f2ff;
    margin:8px 0;
    padding:10px;
    border-radius:5px;

    opacity:0;
    transform:translateY(-20px);
    animation:fadeSlide 0.5s forwards;
}

@keyframes fadeSlide{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

<h2>Node Insertion Demo</h2>

<input type="text" id="itemInput" placeholder="Enter item">
<button onclick="addItem()">Add</button>

<ul id="itemList">
<li>HTML</li>
<li>CSS</li>
</ul>

</div>

<script>

function addItem(){

let input = document.getElementById("itemInput");
let value = input.value.trim();

if(value === ""){
alert("Enter something");
return;
}

let newNode = document.createElement("li");

newNode.textContent = value;

let list = document.getElementById("itemList");

list.appendChild(newNode);

input.value = "";

}

</script>

</body>
</html>
